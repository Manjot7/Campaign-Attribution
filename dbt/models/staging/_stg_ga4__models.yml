version: 2

models:
  - name: stg_ga4__events
    description: >
      Flattened GA4 events, one row per event. NULL / '<Other>' values in
      source/medium/geo columns are expected — the public dataset is
      obfuscated for privacy, not a data quality issue.
    columns:
      - name: event_date_key
        description: YYYYMMDD integer partition key (integer-range partitioning — see model header).
        tests: [not_null]
      - name: event_date
        tests: [not_null]
      - name: event_name
        tests: [not_null]
      - name: user_pseudo_id
        tests: [not_null]
      - name: session_key
        tests: [not_null]
