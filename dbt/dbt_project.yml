name: campaign_attribution
version: "0.1.0"

profile: campaign_attribution

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
seed-paths: ["seeds"]

target-path: target
clean-targets:
  - target
  - dbt_packages

vars:
  # Date shard to process, YYYYMMDD. Passed by the Airflow DAG as {{ ds_nodash }}.
  # Empty string means "all shards" (full refresh / first build).
  ds_nodash: ""

models:
  campaign_attribution:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: marts
    utilities:
      +materialized: table
      +schema: utilities
